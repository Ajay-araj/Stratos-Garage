[pytest]
DJANGO_SETTINGS_MODULE = Stratosgarage.settings
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --strict-markers
    -v
    --tb=short
    -p no:warnings
markers =
    slow: marks tests as slow — concurrent/race condition tests (deselect with '-m "not slow"')
    integration: marks tests that require external services
    unit: marks pure unit tests (no DB, no HTTP)
