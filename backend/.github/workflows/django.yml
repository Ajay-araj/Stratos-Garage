name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: stratogarage_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Stratosgarage/requirements.txt
        pip install pytest pytest-django pytest-cov model-bakery

    - name: Run Tests with Coverage
      env:
        DB_HOST: 127.0.0.1
        DB_USER: postgres
        DB_PASSWORD: password123
        DB_NAME: stratogarage_db
        DJANGO_SETTINGS_MODULE: Stratosgarage.settings.development
        SECRET_KEY: test-secret-key
      run: |
        cd Stratosgarage
        pytest tests/ -v --cov=. --cov-report=xml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy to Production Placeholder
      run: |
        echo "Tests passed! Triggering deployment..."
        # Add actual deployment script here (e.g., SSH to server and run docker-compose pull && up -d)
